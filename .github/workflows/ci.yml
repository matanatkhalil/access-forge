name: CI Check

on:
    push:
        branches: ['**']
    pull_request:
        branches: [main]
    
jobs:
    frontend:
        runs-on: ubuntu-latest
        defaults: 
            run: 
                working-directory: client
        steps:
            - uses: actions/checkout@v4
            - run: npm ci
            - run: npm run format:check
            - run: npm run lint
            - run: npm run build
            - run: npm test
    backend:
        runs-on: ubuntu-latest
        defaults: 
            run: 
                working-directory: server
        steps:
            - uses: actions/checkout@v4
            - run: npm ci
            - run: npm run format:check
            - run: npm run lint
            - run: npm test
